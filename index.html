<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>随机宠物生成器</title>
<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #f5f5f5;
  }

  h1 {
    margin-top: 20px;
  }

  img {
    width: 400px;
    height: 400px;
    object-fit: cover;
    border-radius: 12px;
    margin: 20px;
    transition: opacity 0.5s;
  }

  button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .active {
    background-color: #4CAF50;
    color: white;
  }
</style>
</head>

<body>

<h1>🐶🐱 随机宠物生成器</h1>

<div>
  <button onclick="setMode('dog')" id="dogBtn">只看狗狗</button>
  <button onclick="setMode('cat')" id="catBtn">只看猫咪</button>
  <button onclick="setMode('random')" id="randomBtn" class="active">随机</button>
</div>

<img id="petImage" src="" alt="宠物图片">

<br>

<button onclick="loadImage()">换一张</button>

<p id="status"></p>

<script>
let mode = "random";

function setMode(m) {
  mode = m;

  document.getElementById("dogBtn").classList.remove("active");
  document.getElementById("catBtn").classList.remove("active");
  document.getElementById("randomBtn").classList.remove("active");

  document.getElementById(m + "Btn").classList.add("active");

  loadImage();
}

async function loadImage() {
  const img = document.getElementById("petImage");
  const status = document.getElementById("status");

  img.style.opacity = 0;
  status.innerText = "加载中... 🐾";

  try {
    let url;

    if (mode === "dog") {
      url = "https://dog.ceo/api/breeds/image/random";
      const res = await fetch(url);
      const data = await res.json();
      img.src = data.message;

    } else if (mode === "cat") {
      url = "https://api.thecatapi.com/v1/images/search";
      const res = await fetch(url);
      const data = await res.json();
      img.src = data[0].url;

    } else {
      // 随机选猫或狗
      if (Math.random() > 0.5) {
        const res = await fetch("https://dog.ceo/api/breeds/image/random");
        const data = await res.json();
        img.src = data.message;
      } else {
        const res = await fetch("https://api.thecatapi.com/v1/images/search");
        const data = await res.json();
        img.src = data[0].url;
      }
    }

    img.onload = () => {
      img.style.opacity = 1;
      status.innerText = "";
    };

  } catch (e) {
    status.innerText = "加载失败，请重试 😢";
  }
}

// 页面一打开就加载
loadImage();
</script>

</body>
</html>
